optimizer : {
  type: AdamW,
  kwargs: {
    lr : 0.0005,
    weight_decay : 0.0001   # 建议降低
}}

scheduler: {
  type: LambdaLR,
  kwargs: {
    decay_step: 20,
    lr_decay: 0.7,
    lowest_decay: 0.02
}}

bnmscheduler: {
  type: Lambda,
  kwargs: {
    decay_step: 20,
    bn_decay: 0.5,
    bn_momentum: 0.9,
    lowest_decay: 0.01
}}

dataset : {
  train : {
    _base_: cfgs/dataset_configs/Strawberry.yaml,
    others: {
      subset: 'train',
      data_root: '/your/path/Strawberry_Completion/data/strawberry'
    }
  },
  val : {
    _base_: cfgs/dataset_configs/Strawberry.yaml,
    others: {
      subset: 'val',
      data_root: '/your/path/Strawberry_Completion/data/strawberry'
    }
  },
  test : {
    _base_: cfgs/dataset_configs/Strawberry.yaml,
    others: {
      subset: 'val',
      data_root: '/your/path/Strawberry_Completion/data/strawberry'
    }
  }
}

model : {
  NAME: PoinTr,
  num_pred: 2048,     
  num_query: 128,    
  knn_layer: 1,
  trans_dim: 384
}

total_bs : 32
step_per_update : 1
max_epoch : 300

consider_metric: CDL1